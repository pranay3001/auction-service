server.port=8082

spring.datasource.url=jdbc:postgresql://postgres:5432/auction_db?stringtype=unspecified
spring.datasource.username=optimile_user
spring.datasource.password=optimile_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

vendor.service.url=http://optimile_vendor_service:8083
vendor.service.key=optimile-internal-service-secret
